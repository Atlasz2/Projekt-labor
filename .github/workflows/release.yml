name: Flutter Release

on:
  push:
    branches:
      - main        # prod release
      - develop     # test build
  pull_request:
    branches:
      - develop     # dev build (PR check)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 setup
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: mobile_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        working-directory: mobile_app
        run: flutter test

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "suffix=" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "env=test" >> $GITHUB_OUTPUT
            echo "suffix=-test" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "suffix=-dev" >> $GITHUB_OUTPUT
          fi

      # A google-services.json titkos (gitignore-olt), de a build igényli.
      # Base64-kódolt tartalmát a GOOGLE_SERVICES_JSON_BASE64 Secretből állítjuk
      # vissza. Lásd docs/APP_DISTRIBUTION.md a Secret előállításához.
      - name: Restore google-services.json
        working-directory: mobile_app/android/app
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > google-services.json 2>/dev/null || true
          if ! grep -q '"project_info"' google-services.json 2>/dev/null; then
            echo "::error::A GOOGLE_SERVICES_JSON_BASE64 Secret hibás vagy hiányos."
            echo "A visszaállított fájl mérete: $(wc -c < google-services.json) byte (érvényesnél ~1171 byte)."
            echo "Ellenőrizd, hogy a Secretbe a google-services.json BASE64-e került (nem a nyers JSON, nem a service account)."
            exit 1
          fi
          echo "google-services.json rendben ($(wc -c < google-services.json) byte)."

      - name: Build APK (${{ steps.env.outputs.env }})
        working-directory: mobile_app
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv mobile_app/build/app/outputs/flutter-apk/app-release.apk \
             mobile_app/build/app/outputs/flutter-apk/nagyvazsony${{ steps.env.outputs.suffix }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nagyvazsony-${{ steps.env.outputs.env }}-${{ github.run_number }}
          path: mobile_app/build/app/outputs/flutter-apk/nagyvazsony*.apk
          retention-days: 30

      # Csak main-re pusholáskor: feltöltés a tesztelőknek (Firebase App
      # Distribution). A telefonra push-értesítés érkezik az új verzióról.
      # Az appId nem titok (a firebase.json-ban is szerepel).
      - name: Distribute to testers
        if: github.ref == 'refs/heads/main'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:1062295539229:android:5fa7cddbe97519437840f4
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: mobile_app/build/app/outputs/flutter-apk/nagyvazsony.apk
          releaseNotes: ${{ github.event.head_commit.message }}