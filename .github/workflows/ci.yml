name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Admin (React + Vite) ───────────────────────────────────────────────────
  admin:
    name: Admin — lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Provide dummy values so Vite env references don't throw at build time
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID: placeholder
          VITE_FIREBASE_APP_ID: placeholder
          VITE_GOOGLE_MAPS_API_KEY: placeholder

  # ── Flutter (mobile app) ───────────────────────────────────────────────────
  flutter:
    name: Flutter — analyze / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test


  hosting:
    name: Hosting deploy
    runs-on: ubuntu-latest
    needs: [admin]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.FIREBASE_TOKEN != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if ! grep -q '"hosting"' firebase.json; then
            echo "No hosting config found in firebase.json, skipping deploy."
            exit 0
          fi

          npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN"
